<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Student Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f7fc
        }

        .card {
            max-width: 1000px;
            margin: 30px auto;
            box-shadow: 0 0 20px rgba(0, 0, 0, .1)
        }

        .error {
            color: #dc3545;
            font-size: 13px
        }

        .is-invalid {
            border-color: #dc3545 !important
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h3>College Student Registration Form</h3>
            </div>
            <div class="card-body">
                <form id="registerForm">
                    <div class="row g-3">
                        <div class="col-md-6"><label>First Name *</label><input name="first_name" id="first_name"
                                class="form-control"><small class="error"></small></div>
                        <div class="col-md-6"><label>Last Name *</label><input name="last_name" id="last_name"
                                class="form-control"><small class="error"></small></div>
                        <div class="col-md-6"><label>DOB *</label><input type="date" name="dob" id="dob"
                                class="form-control"><small class="error"></small></div>
                        <div class="col-md-6"><label>Gender *</label><select id="gender" name="gender"
                                class="form-control">
                                <option value="">Select</option>
                                <option>Male</option>
                                <option>Female</option>
                            </select><small class="error"></small></div>
                        <div class="col-md-6"><label>Father Name *</label><input name="father_name" id="father_name"
                                class="form-control"><small class="error"></small></div>
                        <div class="col-md-6"><label>Father Mobile *</label><input name="father_mobile"
                                id="father_mobile" class="form-control"><small class="error"></small></div>
                        <div class="col-md-6"><label>Mother Name *</label><input name="mother_name" id="mother_name"
                                class="form-control"><small class="error"></small></div>
                        <div class="col-md-6"><label>Student Mobile *</label><input name="mobile" id="mobile"
                                class="form-control"><small class="error"></small></div>
                        <div class="col-md-6"><label>Email *</label><input id="email" name="email"
                                class="form-control"><small class="error"></small></div>
                        <div class="col-md-6"><label>Pincode</label><input id="pincode" name="pincode"
                                class="form-control"><small class="error"></small></div>
                        <div class="col-md-12"><label>Address</label><textarea id="address" name="address"
                                class="form-control"></textarea><small class="error"></small></div>
                        <div class="col-md-6"><label>City</label><input id="city" name="city" class="form-control">
                            <small class="error"></small>
                        </div>
                        <div class="col-md-6"><label>State</label><input id="state" name="state" class="form-control">
                            <small class="error"></small>
                        </div>
                        <div class="col-md-6"><label>Course *</label><select id="course" name="course"
                                class="form-control">
                                <option value="">Select</option>
                                <option>BCA</option>
                                <option>BBA</option>
                                <option>B.Tech</option>
                                <option>MCA</option>
                                <option>MBA</option>
                            </select><small class="error"></small></div>
                        <div class="col-md-6"><label>Semester *</label><select id="semester" name="semester"
                                class="form-control">
                                <option value="">Select</option>
                                <option>1</option>
                                <option>2</option>
                                <option>3</option>
                                <option>4</option>
                            </select><small class="error"></small></div>
                        <div class="col-md-6"><label>Password *</label><input type="password" name="password"
                                id="password" class="form-control"><small class="error"></small></div>
                    </div>
                    <button class="btn btn-primary w-100 mt-4">Register Student</button>
                </form>
                <div id="msg" class="mt-3"></div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function (e) {

            e.preventDefault();

            let valid = true;

            document.querySelectorAll('.error').forEach(x => x.innerHTML = '');
            document.querySelectorAll('.form-control').forEach(x => x.classList.remove('is-invalid'));

            function err(id, msg) {
                let f = document.getElementById(id);
                f.classList.add('is-invalid');
                f.parentElement.querySelector('.error').innerHTML = msg;
                valid = false;
            }

            [
                'first_name',
                'last_name',
                'dob',
                'gender',
                'father_name',
                'father_mobile',
                'mother_name',
                'mobile',
                'email',
                'course',
                'semester',
                'password',
                'city',
                'address',
                'pincode',
                'state'
            ].forEach(id => {

                let field = document.getElementById(id);

                if (field.value.trim() === '') {

                    let label = field.parentElement.querySelector('label')
                        .innerText
                        .replace('*', '')
                        .trim();

                    err(id, `${label} field is required`);
                }
            });

            let em = document.getElementById('email').value;

            if (em && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)) {
                err('email', 'Invalid email');
            }

            ['mobile', 'father_mobile'].forEach(id => {

                let v = document.getElementById(id).value;

                if (v && !/^[0-9]{10}$/.test(v)) {
                    err(id, 'Mobile must be 10 digits');
                }
            });

            let p = document.getElementById('password').value;

            if (p && p.length < 6) {
                err('password', 'Minimum 6 characters');
            }

            if (!valid) {
                return;
            }

            try {

                const formData = Object.fromEntries(
                    new FormData(this).entries()
                );

                console.log('FORM DATA =>', formData);

                const response = await fetch('/user/registerPost', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                console.log('STATUS =>', response.status);

                const result = await response.json();
                if (result.status) {

                    Swal.fire({
                        toast: true,
                        position: 'top-end',
                        icon: 'success',
                        title: result.message,
                        showConfirmButton: false,
                        timer: 2000,
                        timerProgressBar: true
                    });

                    setTimeout(() => {
                        window.location.href = '/user/register';
                    }, 1000);

                } else {

                    Swal.fire({
                        toast: true,
                        position: 'top-end',
                        icon: 'error',
                        title: result.message,
                        showConfirmButton: false,
                        timer: 3000,
                        timerProgressBar: true
                    });

                }

            } catch (error) {

                console.error('FETCH ERROR =>', error);

                document.getElementById('msg').innerHTML =
                    `<div class="alert alert-danger">${error.message}</div>`;
            }

        });
    </script>
</body>

</html>
