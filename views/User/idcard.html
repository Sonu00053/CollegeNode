<style>
body{
    background: #eef2ff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    flex-direction:column;
}

/* CARD */
.id-card{
    width: 360px;
    background: linear-gradient(135deg,#1f2937,#374151);
    color:#fff;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* HEADER */
.id-header{
    background:#111827;
    padding:15px;
    text-align:center;
    font-weight:bold;
    letter-spacing:1px;
}

/* BODY */
.id-body{
    padding:20px;
    text-align:center;
}

.id-body img{
    width:90px;
    height:90px;
    border-radius:50%;
    border:3px solid #fff;
    margin-bottom:10px;
}

.info{
    text-align:left;
    margin-top:15px;
    font-size:14px;
}

.info p{
    margin:6px 0;
    border-bottom:1px solid rgba(255,255,255,0.2);
    padding-bottom:4px;
}

/* BUTTON */
.btn-area{
    margin-top:15px;
}

.btn-custom{
    background:#10b981;
    border:none;
    padding:8px 15px;
    border-radius:6px;
    color:#fff;
    cursor:pointer;
}

.btn-custom:hover{
    background:#059669;
}
</style>
</head>

<body>

<!-- CARD -->
<div id="card" class="id-card">

    <div class="id-header">
         ID CARD
    </div>

    <div class="id-body">

        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

        <h5>{{user.first_name}} {{user.last_name}}</h5>

        <div class="info">
            <p><b>ID:</b> {{user.student_id}}</p>
            <p><b>Email:</b> {{user.email}}</p>
            <p><b>Mobile:</b> {{user.mobile}}</p>
            <p><b>Course:</b> {{user.course}}</p>
            <p><b>Semester:</b> {{user.semester}}</p>
        </div>

    </div>

</div>

<!-- BUTTONS -->
<div class="btn-area">
    <button class="btn-custom" onclick="downloadCard()">⬇ Download</button>
    <button class="btn-custom" onclick="window.print()">🖨 Print</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
function downloadCard(){
    const card = document.getElementById("card");

    html2canvas(card).then(canvas => {
        let link = document.createElement("a");
        link.download = "student-id-card.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    });
}
</script>
