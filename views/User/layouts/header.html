<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{CONSTANTS.TITLE}}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4f7fc;
}

/* ================= DESKTOP SIDEBAR ================= */
.sidebar {
    width: 250px;
    height: 100vh;
    position: fixed;
    top: 56px;
    left: 0;
    background: #1f2937;
    overflow-y: auto;
    padding-top: 10px;
}

.sidebar a {
    display: block;
    padding: 12px 15px;
    color: #fff;
    text-decoration: none;
}

.sidebar a:hover {
    background: #374151;
}

/* CONTENT */
.content {
    margin-left: 250px;
    margin-top: 70px;
    padding: 20px;
}

/* MOBILE */
@media (max-width: 768px) {
    .sidebar {
        display: none; /* hide desktop sidebar */
    }

    .content {
        margin-left: 0;
    }
}

/* OFFCANVAS LINK STYLE */
.offcanvas-body a {
    display: block;
    padding: 12px 15px;
    color: #fff;
    text-decoration: none;
}

.offcanvas-body a:hover {
    background: #374151;
}
</style>
</head>

<body>

<!-- ================= TOP NAVBAR ================= -->
<nav class="navbar navbar-dark bg-dark fixed-top">
  <div class="container-fluid">

    <a class="navbar-brand">College Dashboard</a>

    <!-- MOBILE TOGGLE -->
    <button class="btn btn-outline-light d-md-none"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#sidebarMenu">
        ☰
    </button>

  </div>
</nav>

<!-- ================= DESKTOP SIDEBAR ================= -->
<div class="sidebar d-none d-md-block">

    <a href="/user/index">Dashboard</a>

    <a data-bs-toggle="collapse" href="#studentMenu">
        Student Menu ▼
    </a>

    <div class="collapse ps-3" id="studentMenu">

        <a href="#">Profile</a>
        <a href="/user/Idcard/">Id Card</a>
        <a href="#">Attendance</a>
        <a href="#">Fees</a>

    </div>

    <a href="#">Results</a>
    <a href="#">Notice Board</a>
    <a href="/user/logout/" class="text-danger">Logout</a>

</div>

<!-- ================= MOBILE OFFCANVAS ================= -->
<div class="offcanvas offcanvas-start bg-dark text-white"
     tabindex="-1"
     id="sidebarMenu">

  <div class="offcanvas-header">
    <h5 class="text-white">Menu</h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
  </div>

  <div class="offcanvas-body p-0">

    <a href="/user/index">Dashboard</a>

    <a data-bs-toggle="collapse" href="#mstudentMenu">
        Student Menu ▼
    </a>

    <div class="collapse ps-3" id="mstudentMenu">

        <a href="#">Profile</a>
        <a href="/user/Idcard/">Id Card</a>
        <a href="#">Attendance</a>
        <a href="#">Fees</a>

    </div>

    <a href="#">Results</a>
    <a href="#">Notice Board</a>
    <a href="/user/logout/" class="text-danger">Logout</a>

  </div>

</div>
