<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #111827, #1f2937);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .title {
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .btn-primary {
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="login-card">

        <h3 class="title">Student Login</h3>

        <!-- LOGIN FORM -->
        <form id="loginForm">

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="tel" name="phone" id="phone" class="form-control" placeholder="Enter phone number"
                    pattern="[0-9]{10}" maxlength="10" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="Enter password"
                    required>
            </div>

            <button type="submit" class="btn btn-primary">Login</button>

            <div class="text-center mt-3">
                <a href="#">Forgot Password?</a>
            </div>

            <div class="text-center mt-2">
                <small>Don’t have an account? <a href="/user/register/">Register</a></small>
            </div>

        </form>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
document.getElementById("loginForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    let phone = document.getElementById("phone").value;
    let password = document.getElementById("password").value;

    try {
        const response = await fetch('/user/loginpost/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ phone, password })
        });

        // 🔥 SAFE PARSE (important fix)
        const data = await response.json();
        if (data.status === true) {
            await Swal.fire({
                toast: true,
                position: 'top-end',
                icon: 'success',
                title: data.message,
                showConfirmButton: false,
                timer: 1500
            });

            window.location.href = data.redirect;
        } else {
            Swal.fire({
                toast: true,
                position: 'top-end',
                icon: 'error',
                title: data.message || 'Login failed',
                showConfirmButton: false,
                timer: 3000
            });
        }

    } catch (error) {
        console.log("ERROR:", error);
        Swal.fire({
            toast: true,
            position: 'top-end',
            icon: 'error',
            title: 'Server error / Invalid response',
            showConfirmButton: false,
            timer: 3000
        });
    }
});
</script>

</body>

</html>
