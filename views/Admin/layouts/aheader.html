<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{CONSTANTS.TITLE}}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
            overflow-x: hidden;
        }

        .navbar {
            height: 70px;
        }

        .sidebar {
            position: fixed;
            top: 70px;
            left: 0;
            width: 250px;
            height: calc(100vh - 70px);
            background: #212529;
            overflow-y: auto;
            transition: .3s;
        }

        .sidebar a {
            color: #fff;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
        }

        .sidebar a:hover {
            background: #343a40;
        }

        .submenu a {
            padding-left: 45px;
            color: #ccc;
            font-size: 14px;
        }

        #menuBtn {
            display: none;
        }

        /* Content */
        .content {
            margin-left: 250px;
            padding: 80px 20px;
        }

        a {
            text-decoration: none;
        }

        /* Mobile */
        @media(max-width:767px) {

            .sidebar {
                left: -250px;
                z-index: 999;
            }

            .sidebar.show {
                left: 0;
            }

            #menuBtn {
                display: block;
            }

            .content {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

    <!-- Header -->
    <nav class="navbar navbar-dark bg-dark px-3 position-fixed w-100 z-1">

        <!-- Toggle Button -->
        <button class="btn btn-outline-light me-3" id="menuBtn">
            <i class="bi bi-list fs-4"></i>
        </button>

        <span class="navbar-brand fw-bold">
            Admin Panel
        </span>

    </nav>
    <div class="sidebar" id="sidebar">

        <a href="/admin/index">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <a data-bs-toggle="collapse" href="#usersMenu">
            <i class="bi bi-people"></i> Users
        </a>

        <div class="collapse submenu" id="usersMenu">
            <a href="#">All Staff</a>
            <a href="/admin/report/">All Students</a>
        </div>
         <a data-bs-toggle="collapse" href="#courseMenu">
            <i class="bi bi-book"></i> Course
        </a>

        <div class="collapse submenu" id="courseMenu">
            <a href="/admin/add">Add New Course</a>
        </div>
        <a data-bs-toggle="collapse" href="#settingsMenu">
            <i class="bi bi-gear"></i> Settings
        </a>

        <div class="collapse submenu" id="settingsMenu">
            <a href="#">Profile</a>
            <a href="#">Change Password</a>
        </div>
        <a href="/admin/logout">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>

    </div>
