<div class="content">
    <div class="card shadow-sm mt-4">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Staff</h5>
        </div>
        <div class="card-body">

            <form action="/admin/registerPost" method="POST" id="staffForm">

                <!-- Personal Information -->
                <h5 class="border-bottom pb-2 text-primary mb-4">
                    Personal Information
                </h5>

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label class="form-label">First Name</label>
                        <input type="text" name="first_name" class="form-control">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Last Name</label>
                        <input type="text" name="last_name" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Date of Birth</label>
                        <input type="date" name="dob" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Gender</label>
                        <select name="gender" class="form-select">
                            <option value="">Select Gender</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>
                    </div>

                </div>

                <!-- Parents Information -->
                <h5 class="border-bottom pb-2 text-primary mb-4 mt-4">
                    Parents Information
                </h5>

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Father Name</label>
                        <input type="text" name="father_name" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Father Occupation</label>
                        <input type="text" name="father_occupation" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Mother Name</label>
                        <input type="text" name="mother_name" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Mother Occupation</label>
                        <input type="text" name="mother_occupation" class="form-control">
                    </div>

                </div>

                <!-- Contact Information -->
                <h5 class="border-bottom pb-2 text-primary mb-4 mt-4">
                    Contact Information
                </h5>

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Mobile Number</label>
                        <input type="text" name="mobile" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Pincode</label>
                        <input type="text" name="pincode" class="form-control">
                    </div>

                    <div class="col-12 mb-3">
                        <label class="form-label">Address</label>
                        <textarea name="address" rows="3" class="form-control"></textarea>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">City</label>
                        <input type="text" name="city" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">State</label>
                        <input type="text" name="state" class="form-control">
                    </div>

                </div>

                <!-- Account Information -->
                <h5 class="border-bottom pb-2 text-primary mb-4 mt-4">
                    Account Information
                </h5>

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Roles</label>
                        <select name="role" class="form-select">
                            <option value="">Select Role</option>
                            <option value="AC">Accountant</option>
                            <option value="RC">Reception</option>
                        </select>
                    </div>
                </div>

                <div class="text-end mt-4">

                    <button type="reset" class="btn btn-secondary">
                        Reset
                    </button>

                    <button type="submit" class="btn btn-primary">
                        Register Staff
                    </button>

                </div>

            </form>

        </div>

    </div>
</div>


<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    document.getElementById('staffForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        let isValid = true;

        document.querySelectorAll('.error-message').forEach(el => el.remove());
        document.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));

        function showError(fieldName, message) {
            const field = document.querySelector(`[name="${fieldName}"]`);
            if (!field) return;

            field.classList.add('is-invalid');

            const error = document.createElement('div');
            error.className = 'text-danger error-message mt-1';
            error.innerText = message;

            field.parentNode.appendChild(error);

            isValid = false;
        }

        const first_name = document.querySelector('[name="first_name"]').value.trim();
        const last_name = document.querySelector('[name="last_name"]').value.trim();
        const dob = document.querySelector('[name="dob"]').value;
        const gender = document.querySelector('[name="gender"]').value;
        const role = document.querySelector('[name="role"]').value;
        const father_name = document.querySelector('[name="father_name"]').value.trim();
        const mother_name = document.querySelector('[name="mother_name"]').value.trim();
        const email = document.querySelector('[name="email"]').value.trim();
        const mobile = document.querySelector('[name="mobile"]').value.trim();
        const pincode = document.querySelector('[name="pincode"]').value.trim();
        const address = document.querySelector('[name="address"]').value.trim();
        const city = document.querySelector('[name="city"]').value.trim();
        const state = document.querySelector('[name="state"]').value.trim();
        const password = document.querySelector('[name="password"]').value;

        if (!first_name) showError('first_name', 'First Name is required');
        if (!last_name) showError('last_name', 'Last Name is required');
        if (!dob) showError('dob', 'Date of Birth is required');
        if (!gender) showError('gender', 'Please select gender');
        if (!role) showError('role', 'Please select role');
        if (!father_name) showError('father_name', 'Father Name is required');
        if (!mother_name) showError('mother_name', 'Mother Name is required');

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email) showError('email', 'Email is required');
        else if (!emailRegex.test(email)) showError('email', 'Enter valid email');

        if (!mobile) showError('mobile', 'Mobile Number is required');
        else if (!/^[0-9]{10}$/.test(mobile)) showError('mobile', 'Enter valid 10 digit mobile number');

        if (!pincode) showError('pincode', 'Pincode is required');
        else if (!/^[0-9]{6}$/.test(pincode)) showError('pincode', 'Enter valid 6 digit pincode');

        if (!address) showError('address', 'Address is required');
        if (!city) showError('city', 'City is required');
        if (!state) showError('state', 'State is required');

        if (!password) showError('password', 'Password is required');
        else if (password.length < 6) showError('password', 'Password must be at least 6 characters');

        if (!isValid) return;

        // 🔥 API CALL ONLY IF VALID
        let formData = new FormData(this);
        let data = Object.fromEntries(formData.entries());

        try {
            let res = await fetch('/admin/registerPost', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            let result = await res.json();

            Swal.fire({
                toast: true,
                position: 'top-end',
                icon: result.status ? "success" : "error",
                title: result.message,
                timer: 2000,
                showConfirmButton: false
            });

            if (result.status) {
                setTimeout(() => window.location.href = "/admin/register", 1000);
            }

        } catch (err) {
            Swal.fire({
                toast: true,
                position: 'top-end',
                icon: 'error',
                title: 'Server Error',
                timer: 3000
            });
        }
    });
</script>
