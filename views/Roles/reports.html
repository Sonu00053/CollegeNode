

<div class="content">

    <div class="card mt-4 shadow-sm">

        <div class="card-header bg-dark text-white">
            {{title}}
        </div>

        <div class="card-body">

            <table class="table table-bordered" id="example">

                <thead>
                    {{thead}}
                </thead>

                <tbody>
                    {{tableRows}}
                </tbody>

            </table>

        </div>

    </div>

</div>




<!-- Modal -->

<div class="modal fade" id="subjectsModal" tabindex="-1">

    <div class="modal-dialog modal-lg">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">
                    Student Subjects
                </h5>

                <button class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <div class="row" id="subjectsCards">

                </div>

            </div>

        </div>

    </div>

</div>




<script>

document.addEventListener("click", function(e){

    if(!e.target.classList.contains("view-subjects")) return;

    let subjects = [];

    try{

        subjects = JSON.parse(
            e.target.getAttribute("data-subjects")
        );

    }catch(err){

        console.log(err);

    }

    let html = "";

    if(subjects.length==0){

        html=`
        <div class="col-12">

            <div class="alert alert-warning">
                No Subjects Found
            </div>

        </div>
        `;

    }else{

        subjects.forEach(function(item,index){

            html += `
            <div class="col-md-4 mb-3">

                <div class="card border-primary shadow">

                    <div class="card-body text-center">

                        <h6>
                            ${index+1}. ${item}
                        </h6>

                    </div>

                </div>

            </div>
            `;

        });

    }

    document.getElementById("subjectsCards").innerHTML = html;

    const modal = new bootstrap.Modal(
        document.getElementById("subjectsModal")
    );

    modal.show();

});

</script>
