<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{CONSTANTS.TITLE}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fb;
            overflow-x: hidden;
        }

        .navbar {
            height: 70px;
        }

        .sidebar {
            position: fixed;
            top: 70px;
            left: 0;
            width: 250px;
            height: calc(100vh - 70px);
            background: #212529;
            overflow-y: auto;
            transition: .3s;
        }

        .sidebar a {
            color: #fff;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
        }

        .sidebar a:hover {
            background: #343a40;
        }

        .submenu a {
            padding-left: 45px;
            color: #ccc;
            font-size: 14px;
        }

        #menuBtn {
            display: none;
        }

        .content {
            margin-left: 250px;
            padding: 80px 20px;
        }

        a {
            text-decoration: none;
        }

        @media(max-width:767px) {
            .sidebar {
                left: -250px;
                z-index: 999;
            }

            .sidebar.show {
                left: 0;
            }

            #menuBtn {
                display: block;
            }

            .content {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

    <!-- Header -->
    <nav class="navbar navbar-dark bg-dark px-3 position-fixed w-100 z-1">
        <button class="btn btn-outline-light me-3" id="menuBtn">
            <i class="bi bi-list fs-4"></i>
        </button>
        <span class="navbar-brand fw-bold">
            Roles Panel
        </span>

    </nav>


    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">

        <a href="/role/index" data-access="/role/index">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <a data-bs-toggle="collapse" href="#usersMenu">
            <i class="bi bi-people"></i> Users
        </a>

        <div class="collapse submenu" id="usersMenu">
            <a href="/role/register">
                Add Student
            </a>

            <a href="/role/all-students">
                All Students
            </a>
            <a href="/role/recieps-detail">
                Reciept History
            </a>
        </div>
        <a data-bs-toggle="collapse" href="#settingsMenu">
            <i class="bi bi-gear"></i> Settings
        </a>
        <div class="collapse submenu" id="settingsMenu">
            <a href="#">
                Profile
            </a>

            <a href="/role/change-password">
                Change Password
            </a>

        </div>

        <a href="/role/logout">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>

    </div>

    <script>
        const permissions = {{ permissionsJSON }};
        document.querySelectorAll('.sidebar a[href]').forEach(link => {
            const href = link.getAttribute('href');
            if (
                href.startsWith('#usersMenu') ||
                href.startsWith('#settingsMenu') ||
                href === '/role/logout'
            ) {
                return;
            }
            if (!permissions.includes(href)) {
                link.style.display = "none";
            }
        });
        document.querySelectorAll('.submenu').forEach(menu => {

            const visibleLinks = [...menu.querySelectorAll('a[href]')]
                .filter(link => link.style.display !== "none");
            if (visibleLinks.length === 0) {
                const parent = document.querySelector(
                    '[href="#' + menu.id + '"]'
                );
                if (parent) {
                    parent.style.display = "none";
                }
                menu.style.display = "none";
            }

        });
    </script>
