<div class="content">

        <div class="card-body">

            <form id="registerForm">

                    <div class="col-md-6"><label>Mother Name *</label><input name="mother_name" id="mother_name"

                    </div>

                    <div class="col-md-12"><label>Address</label><textarea id="address" name="address"

                    <!-- <div class="col-md-6"><label>State</label><input id="state" name="state" class="form-control">
                        <small class="error"></small>
                    </div> -->
                    <div class="col-md-6 mb-3">



                        <label class="form-label">Course</label>
                        <select name="course" id="course" class="form-select">
                            <option value="">Select Course</option>
                        </select>
                        <small class="error"></small>
                    </div>
                    <input type="hidden" name="subject_ids" id="subject_ids">

                            class="form-control">
                        </select><small class="error"></small></div>

                            <input class="form-check-input" type="checkbox" id="security_allow" name="security_allow"

                            <label>Vehicle Name </label>

        </div>

    </div>
</div>
<div class="modal fade" id="subjectModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5>Select Subjects</h5>
            </div>

            <div class="modal-body" id="subjectList">

            </div>
            <div class="mt-3">
                <h6>Selected Subjects</h6>
                <ul id="selectedSubjectsList" class="list-group"></ul>
            </div>

            <input type="hidden" id="subject_ids" name="subject_ids">

            <div class="modal-footer">
                <button type="button" class="btn btn-danger" onclick="popupClose()">
                    Close
                </button>
                <button type="button" class="btn btn-primary" id="saveSubjects">
                    Save
                </button>

            </div>

        </div>
    </div>
</div>



<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>



<script>

    // console.log('States:', '{{states}}'); 

    function popupClose() {
        bootstrap.Modal.getInstance(
            document.getElementById('subjectModal')
        ).hide();

    }

    document.addEventListener('click', function (e) {

        if (e.target && e.target.id === 'saveSubjects') {
            let ids = [];
            document.querySelectorAll('.subjectCheckbox:checked')
                .forEach(x => ids.push(x.value));
            document.getElementById('subject_ids').value =
                JSON.stringify(ids);
            bootstrap.Modal.getInstance(
                document.getElementById('subjectModal')
            ).hide();


        }

    });


    document.getElementById('semester').addEventListener('change', function () {
        let courseId = document.getElementById('course').value;
        let year = this.value;

        if (courseId && year) {
            selectYear(courseId, year);
        }
        if (courseId == 1) {
         checkCourse(courseId, year);
        }
    });


    function selectYear(cId, year) {
        if (cId == 1 && year == 1) {
            document.getElementById('security_allow').checked = true;
        } else {
            document.getElementById('security_allow').checked = false;

        }
    }


   async function checkCourse(courseId, year) {
    try {
        let response = await fetch(`{{CONSTANTS.role}}subjects-group-course/${courseId}/${year}`);
        let result = await response.json();

        console.log(response);
        console.log(result);

        let duration = parseInt(result.duration) || 0;

        // Reset previous subjects
        document.getElementById('subject_ids').value = '';
        document.getElementById('subjectList').innerHTML = '';

        // Sirf BA ke liye modal
        if (parseInt(courseId) !== 1) {
            return;
        }

        let categories = Object.keys(result.subjects);

        let html = `
        <table class="table table-bordered table-striped">
            <thead class="table-primary text-center">
                <tr>
        `;

        categories.forEach(category => {
            html += `<th>${category}</th>`;
        });

        html += `
                </tr>
            </thead>
            <tbody>
                <tr>
        `;

        categories.forEach(category => {
            html += `<td class="align-top">`;

            const subjects = result.subjects[category] || [];

            subjects.forEach(subject => {
                html += `
                <div class="form-check mb-2">
                    <input
                        class="form-check-input subjectCheckbox"
                        type="checkbox"
                        value="${subject.id}"
                        id="subject_${subject.id}"
                        data-category="${category}"
                        data-semester="${subject.semester ?? ''}">
                    <label class="form-check-label" for="subject_${subject.id}">
                        ${subject.subject_name}
                    </label>
                </div>
                `;
            });

            html += `</td>`;
        });

        html += `
                </tr>
            </tbody>
        </table>
        `;

        document.getElementById('subjectList').innerHTML = html;

        new bootstrap.Modal(
            document.getElementById('subjectModal')
        ).show();

        document.querySelectorAll('.subjectCheckbox').forEach(cb => {
            cb.addEventListener('change', updateSelectedSubjects);
        });

    } catch (error) {
        console.error('Error fetching course data:', error);

        document.getElementById('subjectList').innerHTML =
            `<div class="alert alert-danger">
                Error loading subjects. Please try again.
            </div>`;
    }
}

    // Function to handle checkbox changes



    document.getElementById('course').addEventListener('click', async function () {

    let courseId = this.value;

    if (!courseId) return;
  
    let response = await fetch(`{{CONSTANTS.role}}subjects-group/${courseId}`);
    let result = await response.json();

    // Semester
    let duration = parseInt(result.duration) || 0;
    let semesterHtml = '<option value="">Select Year</option>';

    for (let i = 1; i <= duration; i++) {
        
        semesterHtml += `<option value="${i}">Year ${i}</option>`;
    }

    document.getElementById('semester').innerHTML = semesterHtml;

    

});









    let typingTimer;
    let typedText = '';

    document.addEventListener('keydown', function (e) {

        let modal = document.getElementById('subjectModal');

        if (!modal.classList.contains('show')) {
            return;
        }

        if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') {
            return;
        }

        if (e.key.length === 1 && /^[a-zA-Z]$/.test(e.key)) {

            typedText += e.key.toLowerCase();

            clearTimeout(typingTimer);

            typingTimer = setTimeout(() => {
                typedText = '';
            }, 1000);


            let subjects = document.querySelectorAll('.subjectCheckbox');

            // pehle sabka highlight remove
            document.querySelectorAll('.form-check').forEach(x => {
                x.style.background = '';
            });


            let firstMatch = null;


            subjects.forEach(checkbox => {

                let label = document.querySelector(
                    `label[for="${checkbox.id}"]`
                );

                if (!label) return;


                let subjectName = label.innerText.trim().toLowerCase();


                if (subjectName.startsWith(typedText)) {

                    let item = checkbox.closest('.form-check');

                    // sab matching highlight
                    item.style.background = '#ffff99';


                    // first matching ke liye scroll
                    if (!firstMatch) {
                        firstMatch = item;
                    }
                }

            });


            // first matching subject par scroll
            if (firstMatch) {

                let modalBody = document.querySelector('#subjectList');

                modalBody.scrollTop = firstMatch.offsetTop - 50;

            }

        }

    });

    function updateSelectedSubjects() {

        const checked = document.querySelectorAll('.subjectCheckbox:checked');

        let ids = [];
        let html = '';

        checked.forEach(item => {

            ids.push(item.value);

            const label = document.querySelector(`label[for="${item.id}"]`).innerText;

            html += `
            <li class="list-group-item d-flex justify-content-between align-items-center">
                ${label}
            </li>
        `;
        });

        document.getElementById('subject_ids').value = ids.join(',');

        document.getElementById('selectedSubjectsList').innerHTML =
            html || '<li class="list-group-item text-muted">No subject selected</li>';
    }
</script>

<script>



    JSON.parse('{{course}}').forEach(course => {
        document.getElementById('course').innerHTML += `
            <option value="${course.id}">
                ${course.course_name}
            </option>
        `;
    });




    // Transport checkbox show/hide
    document.getElementById('transport').addEventListener('change', function () {

        document.getElementById('vehicleSection').style.display =
            this.checked ? 'flex' : 'none';

        if (!this.checked) {
            document.getElementById('vehicle_name').value = '';
            document.getElementById('vehicle_no').value = '';
        }

    });

    // mobileValidation('mobile');
    // mobileValidation('father_mobile');
    pincodeValidation('pincode', 6);
    pincodeValidation('mobile', 10);
    pincodeValidation('father_mobile', 10);
    pincodeValidation('aadhar_no', 12);

    document.getElementById('registerForm').addEventListener('submit', async function (e) {

        e.preventDefault();

        let valid = true;

        document.querySelectorAll('.error').forEach(x => x.innerHTML = '');
        document.querySelectorAll('.form-control').forEach(x => x.classList.remove('is-invalid'));

        function err(id, msg) {
            let f = document.getElementById(id);

            if (!f) {
                console.log(id, "field not found");
                return;
            }

            let errorBox = f.parentElement.querySelector('.error');

            if (!errorBox) {
                console.log(id, "error box not found");
                return;
            }

            f.classList.add('is-invalid');
            errorBox.innerHTML = msg;
            valid = false;
        }

        [
            'first_name',
            'dob',
            'father_name',
            'father_mobile',
            'mother_name',
            'mobile',
            'course',
            'semester',
            'city',
            'address',
            // 'pincode',
            'state',
            'student_id',
            // 'apaar_id',
            'category',
            // 'aadhar_no'
            // last_name
            // 'email'
        ].forEach(id => {

            let field = document.getElementById(id);

            if (field.value.trim() === '') {

                let label = field.parentElement.querySelector('label')
                    .innerText
                    .replace('*', '')
                    .trim();

                err(id, `${label} field is required`);
            }
        });

        // Transport validation
        // if (document.getElementById('transport').checked) {

        //     if (document.getElementById('vehicle_name').value.trim() === '') {
        //         err('vehicle_name', 'Vehicle Name field is required');
        //     }

        //     if (document.getElementById('vehicle_no').value.trim() === '') {
        //         err('vehicle_no', 'Vehicle No field is required');
        //     }

        // }

        let em = document.getElementById('email').value;

        if (em && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)) {
            err('email', 'Invalid email');
        }
        // let roll_no = document.getElementById('roll_no').value;

        // if (roll_no && !/^[0-9]+$/.test(roll_no)) {
        //     err('roll_no', 'Roll No must contain only digits');
        // }

        ['mobile', 'father_mobile'].forEach(id => {

            let v = document.getElementById(id).value;

            if (v && !/^[0-9]{10}$/.test(v)) {
                err(id, 'Mobile must be 10 digits');
            }

        });


        if (!valid) return;

        try {

            const formData = Object.fromEntries(new FormData(this).entries());

            // checkbox unchecked hone par value bhejo
            formData.transport = document.getElementById('transport').checked ? 'Yes' : 'No';

            const response = await fetch('{{CONSTANTS.role}}registerPost', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            });

            const result = await response.json();

            if (result.status) {

                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'success',
                    title: result.message,
                    showConfirmButton: false,
                    timer: 2000
                });

                setTimeout(() => {
                    window.location.href = result.redirect;
                }, 1000);

            } else {

                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'error',
                    title: result.message,
                    showConfirmButton: false,
                    timer: 3000
                });

            }

        } catch (error) {

            console.error(error);

        }

    });

    function pincodeValidation(id, digit) {

        const input = document.getElementById(id);

        input.addEventListener('input', function () {

            const error = this.parentElement.querySelector('.error');

            // Sirf numbers allow
            this.value = this.value.replace(/\D/g, '');

            // Max 6 digits
            if (this.value.length > digit) {
                this.value = this.value.substring(0, digit);
            }

            var fieldLabel = fieldName(id);

            if (this.value.length > 0 && this.value.length < digit) {
                this.classList.add('is-invalid');
                error.innerHTML = fieldLabel + ` must be ${digit} digits`;
            } else {
                this.classList.remove('is-invalid');
                error.innerHTML = '';
            }

        });

        input.addEventListener('keypress', function (e) {
            if (!/[0-9]/.test(e.key)) {
                e.preventDefault();
                alert('Only numbers are allowed.');
            }
        });

        function fieldName(id) {
            return id
                .replace(/_/g, ' ')
                .replace(/\b\w/g, c => c.toUpperCase());
        }

    }

    const states = {{states}};
    document.addEventListener('DOMContentLoaded', () => {
        const stateSelect = document.getElementById('state');

        stateSelect.innerHTML = '<option value="">Select State</option>';

        states.forEach(state => {
            stateSelect.insertAdjacentHTML(
                'beforeend',
                `<option value="${state.id}">${state.name}</option>`
            );
        });
    });

</script>
