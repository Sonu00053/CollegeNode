<div class="content">
    <div class="card shadow-sm mt-4">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">{{title}}</h4>
        </div>
        <div class="card-body">
            <form action="{{action}}" method="{{method}}">
                {{fields}}
                <div class="d-flex gap-2 mt-2">
                    {{buttons}}
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    const message = "{{message}}";
    const type = "{{messageType}}";
    const url = "{{action}}";
    if (message) {
        Swal.fire({
            toast: true,
            position: 'top-end',
            icon: type,
            title: message,
            showConfirmButton: false,
            timer: 2000,
            timerProgressBar: true
        });
        setTimeout(() => {
            window.location.href = url;
        }, 2000);
    }
</script>

<script>

window.loadStudentDetails = function () {

    let student_id = document.querySelector('[name="student_id"]').value;

    if (student_id.trim() === '') {
        document.getElementById('studentDetails').innerHTML = '';
        return;
    }

    fetch('${CONSTANTS.role}student-fees', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            student_id: student_id
        })
    })
    .then(res => res.json())
    .then(res => {

        if (!res.status) {
            document.getElementById('studentDetails').innerHTML = '';
            return;
        }

        document.getElementById('studentDetails').innerHTML = `
            <div class="card mt-3 border-primary">
                <div class="card-body">
                    <table class="table table-bordered mb-0">
                        <tr>
                            <th>Total Fees</th>
                            <td>${CONSTANTS.currency}\${res.total_fees}</td>
                        </tr>
                        <tr>
                            <th>Paid Fees</th>
                            <td>${CONSTANTS.currency}\${res.paid_fees}</td>
                        </tr>
                        <tr>
                            <th>Pending Fees</th>
                            <td class="text-danger fw-bold">
                                ${CONSTANTS.currency}\${res.pending_fees}
                            </td>
                        </tr>
                    </table>
                </div>
            </div>`;
    });

};

window.togglePaymentField = function () {

    const mode = document.getElementById('payment_mode').value;
    const div = document.getElementById('payment_details_div');
    const label = document.getElementById('payment_details_label');
    const input = document.getElementById('payment_details');

    if (mode === 'Cash' || mode === '') {
        div.style.display = 'none';
        input.value = '';
    } else {
        div.style.display = 'block';

        if (mode === 'UPI') {
            label.innerText = 'Transaction ID';
            input.placeholder = 'Enter Transaction ID';
        } else if (mode === 'Card') {
            label.innerText = 'Card Number';
            input.placeholder = 'Enter Card Number';
        } else if (mode === 'Bank Transfer') {
            label.innerText = 'Transfer Reference No';
            input.placeholder = 'Enter Transfer Reference No';
        } else {
            label.innerText = 'Cheque Number';
            input.placeholder = 'Enter Cheque Number';
        }
    }
};

document.addEventListener('DOMContentLoaded', function () {
    togglePaymentField();
    loadStudentDetails();
});

</script>
