<div class="content">
    <div class="card shadow-sm mt-4">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">{{title}}</h4>
        </div>
        <div class="card-body">
            <form action="{{action}}" method="{{method}}">
                {{fields}}
                <div class="d-flex gap-2 mt-2">
                    {{buttons}}
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    const message = "{{message}}";
    const type = "{{messageType}}";
    const url = "{{redirect}}";
    if (message) {
        Swal.fire({
            toast: true,
            position: 'top-end',
            icon: type,
            title: message,
            showConfirmButton: false,
            timer: 2000,
            timerProgressBar: true
        });
        setTimeout(() => {
            window.location.href = url;
        }, 2000);
    }
</script>

<script>

    document.addEventListener("DOMContentLoaded", function () {

    togglePaymentField();

    const studentInput = document.querySelector('[name="student_id"]');

    if (studentInput && studentInput.value.trim() !== "") {
        loadStudentDetails();
    }

});

    const studentFeesUrl = "{{studentFeesUrl}}";
    const currency = "{{currency}}";

    window.loadStudentDetails = function () {

        let student_id = document.querySelector('[name="student_id"]').value;

        if (student_id == "") {
            document.getElementById("studentDetails").innerHTML = "";
            return;
        }

        fetch(studentFeesUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                student_id
            })
        })
            .then(r => r.json())
            .then(res => {

                if (!res.status) {
                    document.getElementById("studentDetails").innerHTML = "";
                    return;
                }

                document.getElementById("studentDetails").innerHTML = `
            <div class="card mt-3">
                <div class="card-body">

                <table class="table table-bordered">
                    <tr>
                        <th>Student Name</th>
                        <td>${res.name}</td>
                    </tr>
                    <tr>
                        <th>Father Name</th>
                        <td>${res.father}</td>
                    </tr>
                     <tr>
                        <th>Class</th>
                        <td>${res.course}</td>
                    </tr>

                    <tr>
                        <th>Total Fees</th>
                        <td>${currency}${res.total_fees}</td>
                    </tr>

                    <tr>
                        <th>Paid Fees</th>
                        <td>${currency}${res.paid_fees}</td>
                    </tr>

                    <tr>
                        <th>Pending Fees</th>
                        <td>${currency}${res.pending_fees}</td>
                    </tr>

                </table>

                </div>
            </div>
        `;

            });

    };

    function togglePaymentField() {
        const mode = document.getElementById('payment_mode').value;
        const div = document.getElementById('payment_details_div');
        const label = document.getElementById('payment_details_label');
        const input = document.getElementById('payment_details');

        if (mode === 'Cash' || mode === '') {
            div.style.display = 'none';
            input.value = '';
        } else {
            div.style.display = 'block';

            if (mode === 'UPI') {
                label.innerText = 'Transaction ID';
                input.placeholder = 'Enter Transaction ID';
            }
            else if (mode === 'Card') {
                label.innerText = 'Card Number';
                input.placeholder = 'Enter Card Number';
            }
            else if (mode === 'Bank Transfer') {
                label.innerText = 'Transfer Reference No';
                input.placeholder = 'Enter Transfer Reference No';
            }
            else if (mode === 'Cheque') {
                label.innerText = 'Cheque Number';
                input.placeholder = 'Enter Cheque Number';
            }
        }
    }

    function loadCourseFees() {
        document.getElementById('action_type').value = 'load';
        document.forms[0].submit();
    }
    function updateFees() {
        document.getElementById('action_type').value = 'update';
        return true;
    }

</script>
