<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Portal</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#0d6efd,#6610f2);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .login-card{
            transition:.3s;
            border:none;
            border-radius:15px;
        }

        .login-card:hover{
            transform:translateY(-8px);
            box-shadow:0 15px 35px rgba(0,0,0,.2);
        }

        .icon{
            width:80px;
            height:80px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:35px;
            margin:auto;
            color:#fff;
        }

        .admin-icon{
            background:#0d6efd;
        }

        .staff-icon{
            background:#198754;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="text-center text-white mb-5">
                <h1 class="fw-bold">Welcome</h1>
                <p class="mb-0">Please select your login portal</p>
            </div>

            <div class="row g-4">

                <!-- Admin -->
                <div class="col-md-6">
                    <div class="card login-card shadow h-100">
                        <div class="card-body text-center p-5">

                            <div class="icon admin-icon mb-4">
                                👨‍💼
                            </div>

                            <h3>Admin Panel</h3>

                            <p class="text-muted">
                                Login as Administrator to manage the complete system.
                            </p>

                            <a href="/admin/login" class="btn btn-primary w-100">
                                Admin Login
                            </a>

                        </div>
                    </div>
                </div>

                <!-- Staff -->
                <div class="col-md-6">
                    <div class="card login-card shadow h-100">
                        <div class="card-body text-center p-5">

                            <div class="icon staff-icon mb-4">
                                👨‍🏫
                            </div>

                            <h3>Staff Panel</h3>

                            <p class="text-muted">
                                Login as Staff to access your dashboard.
                            </p>

                            <a href="/staff/login" class="btn btn-success w-100">
                                Staff Login
                            </a>

                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>
</div>

</body>
</html>
